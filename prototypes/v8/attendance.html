<script>
const ACTIVE_MODULE = 'attendance';
const CURRENT_SECTION = 4;
const MODULES = [
  { key: 'strategic', file: 'strategic.html', section: 1, fullKey: 'mod.strategic' },
  { key: 'locomotiveGoals', file: 'locomotive-goals.html', section: 1, fullKey: 'mod.locomotiveGoals' },
  { key: 'newsflash', file: 'newsflash.html', section: 1, fullKey: 'mod.newsflash' },
  { key: 'bestContribution', file: 'our-dashboard.html', section: 2, fullKey: 'mod.bestContribution' },
  { key: 'goalsMetrics', file: 'goals-metrics.html', section: 2, fullKey: 'mod.goalsMetrics' },
  { key: 'actionPlan', file: 'action-plan.html', section: 3, fullKey: 'mod.actionPlan' },
  { key: 'documents', file: 'documents.html', section: 3, fullKey: 'mod.documents' },
  { key: 'ideas', file: 'ideas.html', section: 3, fullKey: 'mod.ideas' },
  { key: 'reflections', file: 'reflections.html', section: 4, fullKey: 'mod.reflections' },
  { key: 'attendance', file: 'attendance.html', section: 4, fullKey: 'mod.attendance' },
  { key: 'archive', file: 'archive.html', section: 4, fullKey: 'mod.archive' },
];
const SECTION_LABELS = { 1: { sv: 'Vart är vi på väg och varför?', en: 'Where are we headed and why?' }, 2: { sv: 'Vår Dashboard', en: 'Our Dashboard' }, 3: { sv: 'Delprojekt & Handlingsplan', en: 'Subprojects & Action Plan' }, 4: { sv: 'Reflektioner & Lärande', en: 'Reflections & Learning' } };
const PROGRESS_STOPS = [
  { section: 1, label: { sv: 'Strategiskt Fokus', en: 'Strategic Focus' }, file: 'strategic.html' },
  { section: 2, label: { sv: 'Vår Dashboard', en: 'Our Dashboard' }, file: 'our-dashboard.html' },
  { section: 3, label: { sv: 'Delprojekt & Handlingsplan', en: 'Subprojects & Action Plan' }, file: 'action-plan.html' },
  { section: 4, label: { sv: 'Reflektioner & Lärande', en: 'Reflections & Learning' }, file: 'reflections.html' },
];
const TRANSLATIONS = { sv: LANG_SV, en: LANG_EN };
let currentLang = localStorage.getItem('itt-lang') || 'sv';
function t(key, params) { let str = (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS['sv'][key] || key; if (params) Object.keys(params).forEach(k => { str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]); }); return str; }
function setLang(lang) { currentLang = lang; localStorage.setItem('itt-lang', lang); document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); document.documentElement.lang = lang; renderAll(); }
document.addEventListener('click', e => { if (e.target.matches('[data-lang]')) setLang(e.target.dataset.lang); });
const S = { role: localStorage.getItem('itt-role') || 'super-admin', orgId: localStorage.getItem('itt-org') || '', editingMeetingId: null };
const $ = id => document.getElementById(id);
const actor = () => ACTORS[S.role];
function getTeamId() { return localStorage.getItem('itt-team') || 'alpha'; }
function orgsForActor() { const a = actor(); if (S.role === 'super-admin') return DB.organizations; return DB.organizations.filter(o => a.orgs.includes(o.id)); }
function getUserTeams() { const a = actor(); const u = DB.users.find(u => u.id === a.userId); if (!u) return DB.teams; if (['super-admin','integ-admin','org-admin'].includes(S.role)) { let teams = DB.teams.filter(t => a.orgs.includes(t.orgId)); if (S.orgId) teams = teams.filter(t => t.orgId === S.orgId); return teams; } return DB.teams.filter(t => u.memberships.some(m => m.teamId === t.id)); }
function getCurrentTeamId() { const teams = getUserTeams(); const stored = getTeamId(); if (stored && teams.some(t => t.id === stored)) return stored; return teams[0]?.id || 'alpha'; }
function getTeamMembers(teamId) { return DB.users.filter(u => u.registerStatus !== 'soft_deleted' && u.memberships.some(m => m.teamId === teamId)); }
function isTeamLeader(user, teamId) { return user.memberships.some(m => m.teamId === teamId && m.teamRole === 'team_leader'); }
function getTeamMeetings(teamId) { return WS.meetings.filter(m => m.teamId === teamId).sort((a, b) => b.date.localeCompare(a.date)); }
function formatDate(dateStr) { const d = new Date(dateStr + 'T00:00:00'); const months = currentLang === 'sv' ? ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'] : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${d.getDate()} ${months[d.getMonth()]}`; }
function formatDateFull(dateStr) { const d = new Date(dateStr + 'T00:00:00'); return d.toLocaleDateString(currentLang === 'sv' ? 'sv-SE' : 'en-US', { year:'numeric', month:'long', day:'numeric' }); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function showToast(msg) { const c = $('toast-container'); const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; c.appendChild(el); setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 4000); }

function renderOrgSelector() { const orgs = orgsForActor(); const sel = $('org-select'); const wrap = $('org-selector-wrap'); const isHighRole = ['super-admin','integ-admin','org-admin'].includes(S.role); if (!isHighRole || orgs.length <= 1) { wrap.style.display = 'none'; if (orgs.length === 1) S.orgId = orgs[0].id; else if (orgs.length === 0) S.orgId = ''; return; } wrap.style.display = ''; if (!S.orgId || !orgs.find(o => o.id === S.orgId)) { S.orgId = orgs[0].id; localStorage.setItem('itt-org', S.orgId); } sel.innerHTML = orgs.map(o => `<option value="${o.id}" ${o.id === S.orgId ? 'selected' : ''}>${o.title}</option>`).join(''); }
$('org-select').addEventListener('change', e => { S.orgId = e.target.value; localStorage.setItem('itt-org', S.orgId); const teams = getUserTeams(); if (teams.length > 0) localStorage.setItem('itt-team', teams[0].id); renderAll(); });
function renderTeamSelector() { const sel = $('team-select'); if (!sel) return; const teams = getUserTeams(); const wrap = $('team-selector-wrap'); if (teams.length <= 1) { wrap.style.display = 'none'; return; } wrap.style.display = ''; const currentTeam = getCurrentTeamId(); sel.innerHTML = teams.map(t => `<option value="${t.id}" ${t.id === currentTeam ? 'selected' : ''}>${t.title}</option>`).join(''); }
$('team-select')?.addEventListener('change', e => { localStorage.setItem('itt-team', e.target.value); renderAll(); });

function renderSidebar() { let html = ''; html += `<a href="my-dashboard.html" class="sidebar__link">${t('nav.myDashboard')}</a>`; html += `<a href="admin.html" class="sidebar__link" data-min-role="team-leader">${t('nav.admin')}</a>`; html += '<div class="sidebar__divider"></div>'; let lastSection = 0; MODULES.forEach(m => { if (m.section !== lastSection) { const l = currentLang === 'en' ? SECTION_LABELS[m.section].en : SECTION_LABELS[m.section].sv; html += `<div class="sidebar__section-label">${l}</div>`; lastSection = m.section; } const isActive = m.key === ACTIVE_MODULE; html += `<a href="${m.file}" class="sidebar__link${isActive ? ' sidebar__link--active' : ''}">${t(m.fullKey)}</a>`; }); $('sidebar-nav').innerHTML = html; }
function renderProgressLine() { let html = ''; PROGRESS_STOPS.forEach((stop, i) => { let cls = 'progress-stop'; if (stop.section < CURRENT_SECTION) cls += ' progress-stop--visited'; else if (stop.section === CURRENT_SECTION) cls += ' progress-stop--current'; else cls += ' progress-stop--future'; const label = currentLang === 'en' ? stop.label.en : stop.label.sv; html += `<a href="${stop.file}" class="${cls}"><div class="progress-stop__circle"></div><div class="progress-stop__label">${label}</div></a>`; if (i < PROGRESS_STOPS.length - 1) html += '<div class="progress-line__rail"></div>'; }); $('progress-line').innerHTML = html; }

function renderGrid() { const teamId = getCurrentTeamId(); const members = getTeamMembers(teamId); const meetings = getTeamMeetings(teamId); const grid = $('att-grid'); if (meetings.length === 0) { grid.innerHTML = ''; $('grid-wrap').innerHTML = '<div class="empty-state"><p>Inga möten registrerade.</p></div>'; return; } if (!document.querySelector('.att-grid')) { $('grid-wrap').innerHTML = '<table class="att-grid" id="att-grid" aria-label="Närvaroöversikt"></table>'; } const table = $('att-grid'); let thead = '<thead><tr><th class="att-name" style="text-align:left;"></th>'; meetings.forEach(m => { thead += `<th>${formatDate(m.date)}</th>`; }); thead += `<th>${t('att.pct')}</th></tr></thead>`; let tbody = '<tbody>'; let meetingTotals = meetings.map(() => ({ present: 0, total: 0 })); let overallPresent = 0, overallTotal = 0; members.forEach(member => { const fn = `${member.firstName} ${member.lastName.charAt(0)}.`; const isTL = isTeamLeader(member, teamId); let mp = 0; tbody += '<tr>'; tbody += `<td class="att-name">${fn}${isTL ? ' <span class="badge badge--leader">TL</span>' : ''}</td>`; meetings.forEach((m, i) => { const att = m.attendees.includes(member.id); if (att) { mp++; meetingTotals[i].present++; } meetingTotals[i].total++; overallTotal++; if (att) overallPresent++; tbody += `<td><span class="${att ? 'att-check' : 'att-cross'}">${att ? '\u2713' : '\u2717'}</span></td>`; }); const pct = meetings.length > 0 ? Math.round((mp / meetings.length) * 100) : 0; tbody += `<td class="att-pct${pct >= 75 ? ' att-pct--good' : ''}">${pct}%</td></tr>`; }); tbody += '</tbody>'; let tfoot = '<tfoot><tr class="att-footer">'; tfoot += `<td class="att-name" style="text-align:left;">${t('att.total')}</td>`; meetings.forEach((m, i) => { tfoot += `<td>${meetingTotals[i].present}/${meetingTotals[i].total}</td>`; }); const op = overallTotal > 0 ? Math.round((overallPresent / overallTotal) * 100) : 0; tfoot += `<td class="att-pct${op >= 75 ? ' att-pct--good' : ''}">${op}%</td></tr></tfoot>`; table.innerHTML = thead + tbody + tfoot; }
function renderTrend() { const teamId = getCurrentTeamId(); const members = getTeamMembers(teamId); const meetings = getTeamMeetings(teamId).slice().reverse(); const area = $('trend-area'); const labels = $('trend-labels'); const yAxis = $('trend-y'); if (meetings.length === 0) { $('trend-chart').style.display = 'none'; return; } $('trend-chart').style.display = ''; const dataPoints = meetings.map(m => { const present = members.filter(u => m.attendees.includes(u.id)).length; return { date: m.date, pct: members.length > 0 ? Math.round((present / members.length) * 100) : 0 }; }); yAxis.innerHTML = '<span>100%</span><span>75%</span><span>50%</span><span>25%</span><span>0%</span>'; area.innerHTML = ''; if (dataPoints.length === 1) { area.innerHTML = `<div class="trend-chart__point" style="left:50%;bottom:${(dataPoints[0].pct / 100) * 150}px;" title="${dataPoints[0].pct}%"></div>`; labels.innerHTML = `<span>${formatDate(dataPoints[0].date)}</span>`; return; } const count = dataPoints.length; const points = dataPoints.map((dp, i) => ({ xPct: count > 1 ? (i / (count - 1)) * 100 : 50, yPx: (dp.pct / 100) * 150, pct: dp.pct, date: dp.date })); points.forEach((p, i) => { const dot = document.createElement('div'); dot.className = 'trend-chart__point'; dot.style.left = p.xPct + '%'; dot.style.bottom = p.yPx + 'px'; dot.title = p.pct + '%'; area.appendChild(dot); if (i < points.length - 1) { const next = points[i + 1]; const areaWidth = area.offsetWidth || 600; const x1 = (p.xPct / 100) * areaWidth; const y1 = p.yPx; const x2 = (next.xPct / 100) * areaWidth; const y2 = next.yPx; const dx = x2 - x1; const dy = y2 - y1; const len = Math.sqrt(dx * dx + dy * dy); const angle = Math.atan2(-dy, dx) * (180 / Math.PI); const line = document.createElement('div'); line.className = 'trend-chart__line'; line.style.left = p.xPct + '%'; line.style.bottom = y1 + 'px'; line.style.width = len + 'px'; line.style.transform = `rotate(${angle}deg)`; area.appendChild(line); } }); labels.innerHTML = points.map(p => `<span>${formatDate(p.date)}</span>`).join(''); }
function renderMeetingList() { const teamId = getCurrentTeamId(); const meetings = getTeamMeetings(teamId); const members = getTeamMembers(teamId); const container = $('meeting-list'); if (meetings.length === 0) { container.innerHTML = ''; return; } container.innerHTML = meetings.map(m => { const presentCount = members.filter(u => m.attendees.includes(u.id)).length; const attendeeList = members.map(u => { const att = m.attendees.includes(u.id); const name = `${u.firstName} ${u.lastName}`; const isTL = isTeamLeader(u, teamId); return `<li><span class="${att ? 'att-check' : 'att-cross'}">${att ? '\u2713' : '\u2717'}</span> ${name}${isTL ? ' <span class="badge badge--leader" style="font-size:9px;">TL</span>' : ''}</li>`; }).join(''); return `<div class="meeting-item" data-meeting-id="${m.id}"><div class="meeting-header" data-toggle-meeting="${m.id}"><span class="meeting-header__date">${formatDateFull(m.date)}</span><span class="meeting-header__count">${presentCount}/${members.length} ${currentLang === 'sv' ? 'närvarande' : 'present'}</span><span class="meeting-header__arrow">&#9660;</span></div><div class="meeting-body">${m.note ? `<div class="meeting-body__note">${m.note}</div>` : ''}<ul class="meeting-body__attendees">${attendeeList}</ul><div style="margin-top:var(--md);"><button class="btn btn--sm btn--outline" data-edit-meeting="${m.id}">Redigera</button></div></div></div>`; }).join(''); }

document.addEventListener('click', e => { const toggle = e.target.closest('[data-toggle-meeting]'); if (toggle) { toggle.closest('.meeting-item').classList.toggle('meeting-item--open'); return; } const editBtn = e.target.closest('[data-edit-meeting]'); if (editBtn) { openMeetingSlideOver(editBtn.dataset.editMeeting); return; } });
function openMeetingSlideOver(meetingId) { const teamId = getCurrentTeamId(); const members = getTeamMembers(teamId); const isEdit = !!meetingId; const meeting = isEdit ? WS.meetings.find(m => m.id === meetingId) : null; S.editingMeetingId = meetingId || null; $('so-meeting-title').textContent = isEdit ? (currentLang === 'sv' ? 'Redigera möte' : 'Edit meeting') : t('att.newMeeting'); const date = meeting ? meeting.date : todayStr(); const note = meeting ? meeting.note : ''; const attendees = meeting ? meeting.attendees : []; $('so-meeting-body').innerHTML = `<div class="form-group"><label class="form-label" for="meeting-date">${t('att.date')}</label><input type="date" class="form-input" id="meeting-date" value="${date}"></div><div class="form-group"><label class="form-label">${currentLang === 'sv' ? 'Deltagare' : 'Attendees'}</label><ul class="check-list" id="meeting-attendees">${members.map(u => { const checked = attendees.includes(u.id) ? 'checked' : ''; const isTL = isTeamLeader(u, teamId); return `<li class="check-item"><input type="checkbox" id="att-${u.id}" value="${u.id}" ${checked}><label for="att-${u.id}">${u.firstName} ${u.lastName}${isTL ? ' (TL)' : ''}</label></li>`; }).join('')}</ul></div><div class="form-group"><label class="form-label" for="meeting-note">${t('att.note')}</label><textarea class="form-input" id="meeting-note" rows="3">${note}</textarea></div>`; $('so-meeting-footer').innerHTML = `<button class="btn btn--hi" id="btn-save-meeting">${t('btn.save')}</button><button class="btn btn--outline" id="btn-cancel-meeting">${t('btn.cancel')}</button>`; const dangerEl = $('so-meeting-danger'); if (isEdit) { dangerEl.style.display = ''; dangerEl.innerHTML = `<button class="btn btn--danger btn--sm" id="btn-delete-meeting">${t('att.deleteMeeting')}</button>`; } else { dangerEl.style.display = 'none'; dangerEl.innerHTML = ''; } $('overlay').classList.add('overlay--visible'); $('so-meeting').classList.add('slide-over--open'); }
function closeMeetingSlideOver() { $('overlay').classList.remove('overlay--visible'); $('so-meeting').classList.remove('slide-over--open'); S.editingMeetingId = null; }

let confirmCallback = null;
function showConfirm(title, text, btnLabel, onConfirm) { $('dialog-title').textContent = title; $('dialog-text').textContent = text; $('dialog-confirm').textContent = btnLabel; confirmCallback = onConfirm; $('dialog-overlay').classList.add('dialog-overlay--visible'); }
$('dialog-cancel').addEventListener('click', () => { $('dialog-overlay').classList.remove('dialog-overlay--visible'); confirmCallback = null; });
$('dialog-confirm').addEventListener('click', () => { $('dialog-overlay').classList.remove('dialog-overlay--visible'); if (confirmCallback) confirmCallback(); confirmCallback = null; });

document.addEventListener('click', e => {
  if (e.target.id === 'btn-save-meeting') { const teamId = getCurrentTeamId(); const date = $('meeting-date')?.value; const note = $('meeting-note')?.value || ''; const checkboxes = document.querySelectorAll('#meeting-attendees input[type="checkbox"]'); const attendees = []; checkboxes.forEach(cb => { if (cb.checked) attendees.push(cb.value); }); if (!date) { showToast(currentLang === 'sv' ? 'Ange ett datum.' : 'Enter a date.'); return; } if (S.editingMeetingId) { const meeting = WS.meetings.find(m => m.id === S.editingMeetingId); if (meeting) { meeting.date = date; meeting.note = note; meeting.attendees = attendees; } showToast(currentLang === 'sv' ? 'Mötet har uppdaterats' : 'Meeting updated'); } else { WS.meetings.push({ id: 'm' + Date.now(), teamId, date, note, attendees }); showToast(currentLang === 'sv' ? 'Mötet har skapats' : 'Meeting created'); } closeMeetingSlideOver(); renderAll(); }
  if (e.target.id === 'btn-cancel-meeting') closeMeetingSlideOver();
  if (e.target.id === 'btn-new-meeting') openMeetingSlideOver(null);
  if (e.target.id === 'btn-delete-meeting') { showConfirm(t('att.deleteMeeting'), currentLang === 'sv' ? 'Vill du radera detta möte?' : 'Delete this meeting?', currentLang === 'sv' ? 'Radera' : 'Delete', () => { WS.meetings = WS.meetings.filter(m => m.id !== S.editingMeetingId); closeMeetingSlideOver(); renderAll(); showToast(currentLang === 'sv' ? 'Mötet har raderats' : 'Meeting deleted'); }); }
  if (e.target.id === 'so-meeting-close' || (e.target.id === 'overlay' && $('so-meeting').classList.contains('slide-over--open'))) closeMeetingSlideOver();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') { if ($('dialog-overlay').classList.contains('dialog-overlay--visible')) { $('dialog-overlay').classList.remove('dialog-overlay--visible'); return; } if ($('so-meeting').classList.contains('slide-over--open')) closeMeetingSlideOver(); } });

function updateStaticText() { $('skip-link').textContent = t('skip'); $('nav-admin').textContent = t('nav.admin'); $('page-title').textContent = t('att.title'); $('trend-title').textContent = t('att.trend'); $('meeting-list-title').textContent = t('att.meetingList'); $('btn-new-meeting').textContent = t('att.newMeeting'); $('dialog-cancel').textContent = t('btn.cancel'); }
function setRole(role) { S.role = role; localStorage.setItem('itt-role', role); document.body.className = 'role-' + role; document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('role-btn--active', b.dataset.role === role)); const orgs = orgsForActor(); if (orgs.length > 0 && !orgs.find(o => o.id === S.orgId)) { S.orgId = orgs[0].id; localStorage.setItem('itt-org', S.orgId); } renderAll(); }
document.querySelectorAll('.role-btn').forEach(b => { b.addEventListener('click', () => setRole(b.dataset.role)); });
function renderAll() { updateStaticText(); renderOrgSelector(); renderTeamSelector(); renderSidebar(); renderProgressLine(); renderGrid(); renderTrend(); renderMeetingList(); }
(function init() { const lang = localStorage.getItem('itt-lang') || 'sv'; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); document.documentElement.lang = lang; setRole(S.role); })();
</script>
</body>
