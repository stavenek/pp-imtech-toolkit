<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

.progress-stop:nth-child(1) { width: 20%; }
.progress-stop:nth-child(2) { width: 20%; }

.progress-stop--visited { background: #22c55e; border-color: #16a34a; color: #fff; }

.main { max-width: 1400px; margin: 0 auto; padding: 0 var(--lg) var(--2xl); padding-bottom: 64px; }
.page-title { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1.1; padding: var(--xl) 0; border-bottom: 3px solid var(--border-strong); margin-bottom: var(--xl); }
.btn { display: inline-flex; align-items: center; gap: var(--sm); padding: var(--sm) var(--lg); border: 2px solid var(--border-strong); background: var(--accent); color: var(--accent-inv); font-family: inherit; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; min-height: 44px; text-decoration: none; transition: box-shadow .15s, transform .15s; }
.btn:hover { box-shadow: 4px 4px 0 var(--hi); }
.btn--hi { background: var(--hi); color: var(--bg-dark); border-color: var(--bg-dark); }
.btn--outline { background: var(--bg); color: var(--text); }
.btn--sm { min-height: 36px; padding: var(--xs) var(--md); font-size: 11px; }
.text-module { border: 3px solid var(--border-strong); padding: var(--xl); margin-bottom: var(--xl); }
.text-module__title { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--xs); }
.text-module__help { font-size: 12px; color: var(--text-muted); margin-bottom: var(--lg); }
.text-module textarea { width: 100%; min-height: 150px; padding: var(--md); border: 2px solid var(--border-strong); font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical; background: var(--bg); color: var(--text); }
.text-module textarea:focus { outline: 3px solid var(--hi); outline-offset: 2px; }
.text-module__footer { display: flex; justify-content: flex-end; margin-top: var(--md); }
.ref-list { list-style: none; }
.ref-item { display: flex; align-items: flex-start; gap: var(--md); padding: var(--md) 0; border-bottom: 1px solid var(--border); }
.ref-item:last-child { border-bottom: none; }
.ref-item__date { min-width: 90px; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); padding-top: 2px; }
.ref-item__text { flex: 1; font-size: 14px; line-height: 1.5; }
.ref-item__actions { display: flex; gap: var(--xs); flex-shrink: 0; }
.ref-item__btn { padding: var(--xs) var(--sm); border: 1px solid var(--border); background: var(--bg); font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; transition: background .15s; }
.ref-item__btn:hover { background: var(--bg-alt); }
.ref-item__btn--del:hover { background: #fff1f0; color: var(--err); }

.role-btn:hover { background: #3a3a55; color: #fff; }
.role-btn--active { background: var(--hi); color: #000; border-color: var(--hi); }
.role-user [data-min-role="team-leader"], .role-user [data-min-role="org-admin"], .role-user [data-min-role="integ-admin"], .role-user [data-min-role="super-admin"] { display: none !important; }

button:focus-visible, a:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid var(--hi); outline-offset: 2px; }

.integ-chat { position: fixed; top: 0; bottom: 40px; right: 0; width: 500px; background: #fff; border-left: 3px solid #0a0a0a; box-shadow: -6px 0 24px rgba(0,0,0,0.2); z-index: 1200; display: none; flex-direction: column; }
.integ-chat--open { display: flex; }
.integ-chat__header { background: #0a0a0a; color: #fff; padding: 12px 16px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

<script>
const ACTIVE_MODULE = 'reflections';
const CURRENT_SECTION = 4;
const MODULES = [
  { key: 'strategic', file: 'strategic.html', section: 1, fullKey: 'mod.strategic' },
  { key: 'locomotiveGoals', file: 'locomotive-goals.html', section: 1, fullKey: 'mod.locomotiveGoals' },
  { key: 'bestContribution', file: 'our-dashboard.html', section: 2, fullKey: 'mod.bestContribution' },
  { key: 'goalsMetrics', file: 'goals-metrics.html', section: 2, fullKey: 'mod.goalsMetrics' },
  { key: 'actionPlan', file: 'action-plan.html', section: 3, fullKey: 'mod.actionPlan' },
  { key: 'documents', file: 'documents.html', section: 3, fullKey: 'mod.documents' },
  { key: 'ideas', file: 'ideas.html', section: 3, fullKey: 'mod.ideas' },
  { key: 'reflections', file: 'reflections.html', section: 4, fullKey: 'mod.reflections' },
  { key: 'attendance', file: 'attendance.html', section: 4, fullKey: 'mod.attendance' },
  { key: 'archive', file: 'archive.html', section: 4, fullKey: 'mod.archive' },
];
const SECTION_LABELS = { 1: { sv: 'Strategiskt fokus', en: 'Strategic Focus' }, 2: { sv: 'Vårt bästa bidrag', en: 'Our Best Contribution' }, 3: { sv: 'Delprojekt & Handlingsplan', en: 'Subprojects & Action Plan' }, 4: { sv: 'Reflektioner & Lärdomar', en: 'Reflections & Learnings' } };
const PROGRESS_STOPS = [
  { section: 1, label: { sv: 'Strategiskt Fokus', en: 'Strategic Focus' }, file: 'strategic.html' },
  { section: 2, label: { sv: 'Vårt bästa bidrag', en: 'Our Best Contribution' }, file: 'our-dashboard.html' },
  { section: 3, label: { sv: 'Delprojekt & Handlingsplan', en: 'Subprojects & Action Plan' }, file: 'action-plan.html' },
  { section: 4, label: { sv: 'Reflektioner & Lärdomar', en: 'Reflections & Learnings' }, file: 'reflections.html' },
];
const TRANSLATIONS = { sv: LANG_SV, en: LANG_EN };
let currentLang = localStorage.getItem('itt-lang') || 'sv';
function t(key, params) { let str = (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS['sv'][key] || key; if (params) Object.keys(params).forEach(k => { str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]); }); return str; }
const S = { role: localStorage.getItem('itt-role') || 'super-admin', orgId: localStorage.getItem('itt-org') || '' };
const $ = id => document.getElementById(id);
const actor = () => ACTORS[S.role];
function getTeamId() { return localStorage.getItem('itt-team') || 'alpha'; }
function orgsForActor() { const a = actor(); if (S.role === 'super-admin') return DB.organizations; return DB.organizations.filter(o => a.orgs.includes(o.id)); }
function getUserTeams() { const a = actor(); const u = DB.users.find(u => u.id === a.userId); if (['super-admin','integ-admin','org-admin'].includes(S.role)) { let teams = DB.teams.filter(t => a.orgs.includes(t.orgId)); if (S.orgId) teams = teams.filter(t => t.orgId === S.orgId); return teams; } if (!u) return DB.teams; return DB.teams.filter(t => u.memberships.some(m => m.teamId === t.id)); }
function getCurrentTeamId() { const teams = getUserTeams(); const stored = getTeamId(); if (stored && teams.some(t => t.id === stored)) return stored; return teams[0]?.id || 'alpha'; }
function showToast(msg) { const c = $('toast-container'); const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; c.appendChild(el); setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 4000); }

function setLang(lang) { currentLang = lang; localStorage.setItem('itt-lang', lang); document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); document.documentElement.lang = lang; updateStaticText(); renderSidebar(); renderProgressLine(); renderContent(); }
function updateStaticText() { $('skip-link').textContent = t('skip'); $('nav-integ').textContent = 'Integ'; $('page-title').textContent = t('ref.title'); }
document.addEventListener('click', e => { if (e.target.matches('[data-lang]')) setLang(e.target.dataset.lang); });

function renderOrgSelector() { const orgs = orgsForActor(); const sel = $('org-select'); const wrap = $('org-selector-wrap'); const isHighRole = ['super-admin','integ-admin','org-admin'].includes(S.role); if (!isHighRole || orgs.length <= 1) { wrap.style.display = 'none'; if (orgs.length === 1) S.orgId = orgs[0].id; else if (orgs.length === 0) S.orgId = ''; return; } wrap.style.display = ''; if (!S.orgId || !orgs.find(o => o.id === S.orgId)) { S.orgId = orgs[0].id; localStorage.setItem('itt-org', S.orgId); } sel.innerHTML = orgs.map(o => `<option value="${o.id}" ${o.id === S.orgId ? 'selected' : ''}>${o.title}</option>`).join(''); }
$('org-select').addEventListener('change', e => { S.orgId = e.target.value; localStorage.setItem('itt-org', S.orgId); const teams = getUserTeams(); if (teams.length > 0) localStorage.setItem('itt-team', teams[0].id); renderSidebar(); renderContent(); });
function renderTeamSelector() { const sel = $('team-select'); if (!sel) return; const teams = getUserTeams(); const wrap = $('team-selector-wrap'); if (teams.length <= 1) { wrap.style.display = 'none'; return; } wrap.style.display = ''; const currentTeam = getCurrentTeamId(); sel.innerHTML = teams.map(t => `<option value="${t.id}" ${t.id === currentTeam ? 'selected' : ''}>${t.title}</option>`).join(''); }
$('team-select')?.addEventListener('change', e => { localStorage.setItem('itt-team', e.target.value); renderSidebar(); renderContent(); });


// ============================================================
// MEETING TIMER
// ============================================================
const SECTION_ALLOC = { 1: 720, 2: 720, 3: 1440, 4: 720 }; // seconds (12+12+24+12 = 60 min)

function isMeetingActive() { return localStorage.getItem('itt-meeting-active') === 'true'; }

function startMeeting() {
  const now = Date.now();
  localStorage.setItem('itt-meeting-active', 'true');
  localStorage.setItem('itt-meeting-start', String(now));
  localStorage.setItem('itt-meeting-section-times', JSON.stringify({1:0,2:0,3:0,4:0}));
  localStorage.setItem('itt-meeting-section-enter', String(now));
  localStorage.setItem('itt-meeting-current-section', '1');
  location.href = 'strategic.html';
}

function stopMeeting() {
  flushSectionTime();
  localStorage.removeItem('itt-meeting-active');
  localStorage.removeItem('itt-meeting-start');
  localStorage.removeItem('itt-meeting-section-enter');
  localStorage.removeItem('itt-meeting-current-section');
  renderAll();
}

function flushSectionTime() {
  if (!isMeetingActive()) return;
  const enter = parseInt(localStorage.getItem('itt-meeting-section-enter') || '0');
  const sec = parseInt(localStorage.getItem('itt-meeting-current-section') || '0');
  if (!enter || !sec || enter < 1000000000000) return;
  const elapsed = (Date.now() - enter) / 1000;
  const times = JSON.parse(localStorage.getItem('itt-meeting-section-times') || '{}');
  times[sec] = (times[sec] || 0) + elapsed;
  localStorage.setItem('itt-meeting-section-times', JSON.stringify(times));
  localStorage.setItem('itt-meeting-section-enter', String(Date.now()));
  localStorage.setItem('itt-meeting-current-section', String(CURRENT_SECTION));
}

function getSectionFill(section) {
  const times = JSON.parse(localStorage.getItem('itt-meeting-section-times') || '{}');
  if (!Object.keys(times).length) return 0;
  let spent = times[section] || 0;
  // Add live elapsed for current section
  if (isMeetingActive() && section === CURRENT_SECTION) {
    const enter = parseInt(localStorage.getItem('itt-meeting-section-enter') || '0');
    if (enter) spent += (Date.now() - enter) / 1000;
  }
  const alloc = SECTION_ALLOC[section] || 720;
  return Math.min(100, (spent / alloc) * 100);
}

// Flush time from previous section on page load
if (isMeetingActive()) {
  const prevSec = parseInt(localStorage.getItem('itt-meeting-current-section') || '0');
  if (prevSec && prevSec !== CURRENT_SECTION) { flushSectionTime(); }
  localStorage.setItem('itt-meeting-section-enter', String(Date.now()));
  localStorage.setItem('itt-meeting-current-section', String(CURRENT_SECTION));
}

// Live timer update every 5 seconds
setInterval(() => { if (isMeetingActive()) renderProgressLine(); }, 5000);

function renderSidebar() {
  let html = '';
  html += `<a href="my-dashboard.html" class="sidebar__link">${t('nav.myDashboard')}</a>`;

  if (isMeetingActive()) {
    html += `<a href="#" class="sidebar__link sidebar__link--meeting-stop" onclick="event.preventDefault();stopMeeting();">&#9632; Avsluta möte</a>`;
  } else {
    html += `<a href="#" class="sidebar__link sidebar__link--meeting" onclick="event.preventDefault();startMeeting();">&#9654; Starta möte</a>`;
  }
  html += `<a href="admin.html" class="sidebar__link" data-min-role="team-leader">${t('nav.admin')}</a>`;
  html += '<div class="sidebar__divider"></div>';
  let lastSection = 0;
  MODULES.forEach(m => {
    if (m.section !== lastSection) { const l = currentLang === 'en' ? SECTION_LABELS[m.section].en : SECTION_LABELS[m.section].sv; html += `<div class="sidebar__section-label">${l}</div>`; lastSection = m.section; }
    const isActive = (m.key === 'reflections');
    const preread = (m.key === 'documents' && typeof WS !== 'undefined') ? WS.documents.filter(d => d.teamId === S.teamId && d.isPreRead).length : 0;
    html += `<a href="${m.file}" class="sidebar__link${isActive ? ' sidebar__link--active' : ''}">${t(m.fullKey)}${preread ? '<span class="sidebar__preread"></span>' : ''}</a>`;
  });
  $('sidebar-nav').innerHTML = html;
}
function renderProgressLine() {
  let html = '';
  const meetingActive = isMeetingActive();
  const hasMeetingData = !!localStorage.getItem('itt-meeting-section-times');
  const meeting = meetingActive || hasMeetingData;
  PROGRESS_STOPS.forEach((stop, i) => {
    let cls = 'progress-stop';
    const fill = meeting ? getSectionFill(stop.section) : 0;
    if (meeting && fill > 0 && stop.section !== CURRENT_SECTION) {
      cls += ' progress-stop--fill';
    } else if (meetingActive && stop.section === CURRENT_SECTION) {
      cls += ' progress-stop--fill-current';
    } else if (hasMeetingData && !meetingActive && stop.section === CURRENT_SECTION) {
      cls += ' progress-stop--current';
    } else if (stop.section < CURRENT_SECTION) {
      cls += ' progress-stop--visited';
    } else if (stop.section === CURRENT_SECTION) {
      cls += ' progress-stop--current';
    } else {
      cls += ' progress-stop--future';
    }
    const label = currentLang === 'en' ? stop.label.en : stop.label.sv;
    const style = meeting ? ` style="--fill:${fill.toFixed(1)}%"` : '';
    html += `<a href="${stop.file}" class="${cls}"${style}>${label}</a>`;
  });
  $('progress-line').innerHTML = html;
}

function renderContent() {
  const teamId = getCurrentTeamId();
  const data = WS.textModules[teamId] || { teamworkRules: '', reflections: [] };
  const refs = Array.isArray(data.reflections) ? data.reflections : [];

  let refListHtml = '';
  if (refs.length === 0) {
    refListHtml = '<div class="ref-empty">Inga reflektioner ännu.</div>';
  } else {
    refListHtml = '<ul class="ref-list">' + refs.map(r => `
      <li class="ref-item" data-id="${r.id}">
        <span class="ref-item__date">${r.date}</span>
        <span class="ref-item__text">${r.text}</span>
        <span class="ref-item__actions" data-min-role="team-leader">
          <button class="ref-item__btn" data-edit="${r.id}">Redigera</button>
          <button class="ref-item__btn ref-item__btn--del" data-del="${r.id}">Radera</button>
        </span>
      </li>
    `).join('') + '</ul>';
  }

  $('content-area').innerHTML = `
    <div class="text-module" id="block-reflections">
      <h2 class="text-module__title" id="lbl-reflections">${t('ref.reflections')}</h2>
      <p class="text-module__help" id="help-reflections">${t('ref.reflHelp')}</p>
      <div style="margin-bottom:var(--md);" data-min-role="team-leader">
        <button class="btn btn--hi" id="ref-add-btn">+ Ny reflektion</button>
      </div>
      ${refListHtml}
    </div>

    <div class="text-module" id="block-rules">
      <h2 class="text-module__title" id="lbl-rules"><a name="spelregler"></a>${t('ref.rules')}</h2>
      <textarea id="ta-rules" aria-labelledby="lbl-rules">${data.teamworkRules || ''}</textarea>
      <div class="text-module__footer">
        <button class="btn" id="save-rules">${t('btn.save')}</button>
      </div>
    </div>
  `;

  $('save-rules').addEventListener('click', () => {
    const teamId = getCurrentTeamId();
    if (!WS.textModules[teamId]) WS.textModules[teamId] = {};
    WS.textModules[teamId].teamworkRules = $('ta-rules').value;
    showToast(t('ref.saved'));
  });

  $('ref-add-btn').addEventListener('click', () => {
    const text = prompt('Ny reflektion / lärdom:');
    if (!text || !text.trim()) return;
    const teamId = getCurrentTeamId();
    if (!WS.textModules[teamId]) WS.textModules[teamId] = { teamworkRules: '', reflections: [] };
    if (!Array.isArray(WS.textModules[teamId].reflections)) WS.textModules[teamId].reflections = [];
    WS.textModules[teamId].reflections.unshift({ id: 'r' + Date.now(), date: new Date().toISOString().substring(0, 10), text: text.trim() });
    showToast('Reflektion tillagd');
    renderContent();
  });

  $('block-reflections').addEventListener('click', e => {
    const editBtn = e.target.closest('[data-edit]');
    const delBtn = e.target.closest('[data-del]');
    const teamId = getCurrentTeamId();
    const refs = WS.textModules[teamId]?.reflections || [];
    if (delBtn) { const id = delBtn.dataset.del; WS.textModules[teamId].reflections = refs.filter(r => r.id !== id); showToast('Reflektion raderad'); renderContent(); }
    if (editBtn) { const id = editBtn.dataset.edit; const ref = refs.find(r => r.id === id); if (!ref) return; const newText = prompt('Redigera reflektion:', ref.text); if (newText !== null && newText.trim()) { ref.text = newText.trim(); showToast('Reflektion uppdaterad'); renderContent(); } }
  });

  // Scroll to spelregler if hash present
  if (window.location.hash === '#spelregler') {
    const el = document.querySelector('[name="spelregler"]');
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 100);
  }
}

function setRole(role) { S.role = role; localStorage.setItem('itt-role', role); document.body.className = 'role-' + role; document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('role-btn--active', b.dataset.role === role)); const orgs = orgsForActor(); if (orgs.length > 0 && !orgs.find(o => o.id === S.orgId)) { S.orgId = orgs[0].id; localStorage.setItem('itt-org', S.orgId); } renderAll(); }

function toggleIntegChat() {
  const chat = document.getElementById('integ-chat');
  if (chat) chat.classList.toggle('integ-chat--open');
}

function renderAll() { renderOrgSelector(); renderTeamSelector(); updateStaticText(); renderSidebar(); renderProgressLine(); renderContent(); }
document.querySelectorAll('.role-btn').forEach(b => { b.addEventListener('click', () => setRole(b.dataset.role)); });

// Listen for hash changes
window.addEventListener('hashchange', () => {
  if (window.location.hash === '#spelregler') {
    const el = document.querySelector('[name="spelregler"]');
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }
});

(function init() { const lang = localStorage.getItem('itt-lang') || 'sv'; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); document.documentElement.lang = lang; setRole(S.role); })();
</script>
</body>
</html>
