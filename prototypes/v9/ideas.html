<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #ffffff; --bg-alt: #f0f0f0; --bg-dark: #0a0a0a; --text: #0a0a0a; --text-muted: #666666; --border: #e0e0e0; --border-strong: #0a0a0a; --accent: #0a0a0a; --accent-hover: #333; --accent-inv: #ffffff; --hi: #ffcc00; --hi-soft: rgba(255,204,0,0.18); --ok: #00a854; --warn: #fa8c16; --err: #e6001a; --xs: 4px; --sm: 8px; --md: 16px; --lg: 24px; --xl: 32px; --2xl: 48px; --sidebar-w: 240px; --progress-h: 32px; }

</style>

<script>
const ACTIVE_MODULE = 'ideas';
const CURRENT_SECTION = 3;
const MODULES = [
  { key: 'strategic', file: 'strategic.html', section: 1, fullKey: 'mod.strategic' },
  { key: 'locomotiveGoals', file: 'locomotive-goals.html', section: 1, fullKey: 'mod.locomotiveGoals' },
  { key: 'bestContribution', file: 'our-dashboard.html', section: 2, fullKey: 'mod.bestContribution' },
  { key: 'goalsMetrics', file: 'goals-metrics.html', section: 2, fullKey: 'mod.goalsMetrics' },
  { key: 'actionPlan', file: 'action-plan.html', section: 3, fullKey: 'mod.actionPlan' },
  { key: 'documents', file: 'documents.html', section: 3, fullKey: 'mod.documents' },
  { key: 'ideas', file: 'ideas.html', section: 3, fullKey: 'mod.ideas' },
  { key: 'reflections', file: 'reflections.html', section: 4, fullKey: 'mod.reflections' },
  { key: 'attendance', file: 'attendance.html', section: 4, fullKey: 'mod.attendance' },
  { key: 'archive', file: 'archive.html', section: 4, fullKey: 'mod.archive' },
];
const SECTION_LABELS = { 1: { sv: 'Strategiskt fokus', en: 'Strategic Focus' }, 2: { sv: 'Vårt bästa bidrag', en: 'Our Best Contribution' }, 3: { sv: 'Delprojekt & Handlingsplan', en: 'Subprojects & Action Plan' }, 4: { sv: 'Reflektioner & Lärdomar', en: 'Reflections & Learnings' } };
const PROGRESS_STOPS = [
  { section: 1, label: { sv: 'Strategiskt Fokus', en: 'Strategic Focus' }, file: 'strategic.html' },
  { section: 2, label: { sv: 'Vårt bästa bidrag', en: 'Our Best Contribution' }, file: 'our-dashboard.html' },
  { section: 3, label: { sv: 'Delprojekt & Handlingsplan', en: 'Subprojects & Action Plan' }, file: 'action-plan.html' },
  { section: 4, label: { sv: 'Reflektioner & Lärdomar', en: 'Reflections & Learnings' }, file: 'reflections.html' },
];
const TRANSLATIONS = { sv: LANG_SV, en: LANG_EN };
let currentLang = localStorage.getItem('itt-lang') || 'sv';
function t(key, params) { let str = (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS['sv'][key] || key; if (params) Object.keys(params).forEach(k => { str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]); }); return str; }
const S = { role: localStorage.getItem('itt-role') || 'super-admin', orgId: localStorage.getItem('itt-org') || '', editIdeaId: null };
const $ = id => document.getElementById(id);
const actor = () => ACTORS[S.role];
const userById = id => DB.users.find(u => u.id === id);
const fullName = u => u ? `${u.firstName} ${u.lastName}` : '?';
function getTeamId() { return localStorage.getItem('itt-team') || 'alpha'; }
function orgsForActor() { const a = actor(); if (S.role === 'super-admin') return DB.organizations; return DB.organizations.filter(o => a.orgs.includes(o.id)); }
function getUserTeams() { const a = actor(); const u = DB.users.find(u => u.id === a.userId); if (['super-admin','integ-admin','org-admin'].includes(S.role)) { let teams = DB.teams.filter(t => a.orgs.includes(t.orgId)); if (S.orgId) teams = teams.filter(t => t.orgId === S.orgId); return teams; } if (!u) return DB.teams; return DB.teams.filter(t => u.memberships.some(m => m.teamId === t.id)); }
function getCurrentTeamId() { const teams = getUserTeams(); const stored = getTeamId(); if (stored && teams.some(t => t.id === stored)) return stored; return teams[0]?.id || 'alpha'; }
function showToast(msg) { const c = $('toast-container'); const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; c.appendChild(el); setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 4000); }
let confirmCallback = null;
function showConfirm(title, text, label, cb) { $('dialog-title').textContent = title; $('dialog-text').textContent = text; const btn = $('dialog-confirm'); btn.textContent = t('btn.wait'); btn.disabled = true; confirmCallback = cb; $('confirm-dialog').classList.add('dialog-overlay--visible'); setTimeout(() => { btn.textContent = label; btn.disabled = false; }, 1000); }
function closeConfirm() { $('confirm-dialog').classList.remove('dialog-overlay--visible'); confirmCallback = null; }
$('dialog-cancel').onclick = closeConfirm;
$('dialog-confirm').onclick = () => { if (confirmCallback) confirmCallback(); closeConfirm(); };

function setLang(lang) { currentLang = lang; localStorage.setItem('itt-lang', lang); document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); document.documentElement.lang = lang; updateStaticText(); renderSidebar(); renderProgressLine(); renderIdeas(); }
function updateStaticText() { $('skip-link').textContent = t('skip'); $('nav-integ').textContent = 'Integ'; $('page-title').textContent = t('idea.title'); $('btn-new-idea').textContent = t('idea.new'); $('dialog-cancel').textContent = t('btn.cancel'); }
document.addEventListener('click', e => { if (e.target.matches('[data-lang]')) setLang(e.target.dataset.lang); });

function renderOrgSelector() { const orgs = orgsForActor(); const sel = $('org-select'); const wrap = $('org-selector-wrap'); const isHighRole = ['super-admin','integ-admin','org-admin'].includes(S.role); if (!isHighRole || orgs.length <= 1) { wrap.style.display = 'none'; if (orgs.length === 1) S.orgId = orgs[0].id; else if (orgs.length === 0) S.orgId = ''; return; } wrap.style.display = ''; if (!S.orgId || !orgs.find(o => o.id === S.orgId)) { S.orgId = orgs[0].id; localStorage.setItem('itt-org', S.orgId); } sel.innerHTML = orgs.map(o => `<option value="${o.id}" ${o.id === S.orgId ? 'selected' : ''}>${o.title}</option>`).join(''); }
$('org-select').addEventListener('change', e => { S.orgId = e.target.value; localStorage.setItem('itt-org', S.orgId); const teams = getUserTeams(); if (teams.length > 0) localStorage.setItem('itt-team', teams[0].id); renderSidebar(); renderIdeas(); });
function renderTeamSelector() { const sel = $('team-select'); if (!sel) return; const teams = getUserTeams(); const wrap = $('team-selector-wrap'); if (teams.length <= 1) { wrap.style.display = 'none'; return; } wrap.style.display = ''; const currentTeam = getCurrentTeamId(); sel.innerHTML = teams.map(t => `<option value="${t.id}" ${t.id === currentTeam ? 'selected' : ''}>${t.title}</option>`).join(''); }
$('team-select')?.addEventListener('change', e => { localStorage.setItem('itt-team', e.target.value); renderSidebar(); renderIdeas(); });


// ============================================================
// MEETING TIMER
// ============================================================
const SECTION_ALLOC = { 1: 720, 2: 720, 3: 1440, 4: 720 }; // seconds (12+12+24+12 = 60 min)

function isMeetingActive() { return localStorage.getItem('itt-meeting-active') === 'true'; }

function startMeeting() {
  const now = Date.now();
  localStorage.setItem('itt-meeting-active', 'true');
  localStorage.setItem('itt-meeting-start', String(now));
  localStorage.setItem('itt-meeting-section-times', JSON.stringify({1:0,2:0,3:0,4:0}));
  localStorage.setItem('itt-meeting-section-enter', String(now));
  localStorage.setItem('itt-meeting-current-section', '1');
  location.href = 'strategic.html';
}

function stopMeeting() {
  flushSectionTime();
  localStorage.removeItem('itt-meeting-active');
  localStorage.removeItem('itt-meeting-start');
  localStorage.removeItem('itt-meeting-section-enter');
  localStorage.removeItem('itt-meeting-current-section');
  renderAll();
}

function flushSectionTime() {
  if (!isMeetingActive()) return;
  const enter = parseInt(localStorage.getItem('itt-meeting-section-enter') || '0');
  const sec = parseInt(localStorage.getItem('itt-meeting-current-section') || '0');
  if (!enter || !sec || enter < 1000000000000) return;
  const elapsed = (Date.now() - enter) / 1000;
  const times = JSON.parse(localStorage.getItem('itt-meeting-section-times') || '{}');
  times[sec] = (times[sec] || 0) + elapsed;
  localStorage.setItem('itt-meeting-section-times', JSON.stringify(times));
  localStorage.setItem('itt-meeting-section-enter', String(Date.now()));
  localStorage.setItem('itt-meeting-current-section', String(CURRENT_SECTION));
}

function getSectionFill(section) {
  const times = JSON.parse(localStorage.getItem('itt-meeting-section-times') || '{}');
  if (!Object.keys(times).length) return 0;
  let spent = times[section] || 0;
  // Add live elapsed for current section
  if (isMeetingActive() && section === CURRENT_SECTION) {
    const enter = parseInt(localStorage.getItem('itt-meeting-section-enter') || '0');
    if (enter) spent += (Date.now() - enter) / 1000;
  }
  const alloc = SECTION_ALLOC[section] || 720;
  return Math.min(100, (spent / alloc) * 100);
}

// Flush time from previous section on page load
if (isMeetingActive()) {
  const prevSec = parseInt(localStorage.getItem('itt-meeting-current-section') || '0');
  if (prevSec && prevSec !== CURRENT_SECTION) { flushSectionTime(); }
  localStorage.setItem('itt-meeting-section-enter', String(Date.now()));
  localStorage.setItem('itt-meeting-current-section', String(CURRENT_SECTION));
}

// Live timer update every 5 seconds
setInterval(() => { if (isMeetingActive()) renderProgressLine(); }, 5000);

function renderSidebar() { let html = ''; html += `<a href="my-dashboard.html" class="sidebar__link">${t('nav.myDashboard')}</a>`; if (isMeetingActive()) { html += `<a href="#" class="sidebar__link sidebar__link--meeting-stop" onclick="event.preventDefault();stopMeeting();">&#9632; Avsluta möte</a>`; } else { html += `<a href="#" class="sidebar__link sidebar__link--meeting" onclick="event.preventDefault();startMeeting();">&#9654; Starta möte</a>`; } html += `<a href="admin.html" class="sidebar__link" data-min-role="team-leader">${t('nav.admin')}</a>`; html += '<div class="sidebar__divider"></div>'; let lastSection = 0; MODULES.forEach(m => { if (m.section !== lastSection) { const l = currentLang === 'en' ? SECTION_LABELS[m.section].en : SECTION_LABELS[m.section].sv; html += `<div class="sidebar__section-label">${l}</div>`; lastSection = m.section; } const isActive = m.key === ACTIVE_MODULE; const preread = (m.key === 'documents' && typeof WS !== 'undefined') ? WS.documents.filter(d => d.teamId === S.teamId && d.isPreRead).length : 0;
    html += `<a href="${m.file}" class="sidebar__link${isActive ? ' sidebar__link--active' : ''}">${t(m.fullKey)}${preread ? '<span class="sidebar__preread"></span>' : ''}</a>`; }); $('sidebar-nav').innerHTML = html; }
function renderProgressLine() {
  let html = '';
  const meetingActive = isMeetingActive();
  const hasMeetingData = !!localStorage.getItem('itt-meeting-section-times');
  const meeting = meetingActive || hasMeetingData;
  PROGRESS_STOPS.forEach((stop, i) => {
    let cls = 'progress-stop';
    const fill = meeting ? getSectionFill(stop.section) : 0;
    if (meeting && fill > 0 && stop.section !== CURRENT_SECTION) {
      cls += ' progress-stop--fill';
    } else if (meetingActive && stop.section === CURRENT_SECTION) {
      cls += ' progress-stop--fill-current';
    } else if (hasMeetingData && !meetingActive && stop.section === CURRENT_SECTION) {
      cls += ' progress-stop--current';
    } else if (stop.section < CURRENT_SECTION) {
      cls += ' progress-stop--visited';
    } else if (stop.section === CURRENT_SECTION) {
      cls += ' progress-stop--current';
    } else {
      cls += ' progress-stop--future';
    }
    const label = currentLang === 'en' ? stop.label.en : stop.label.sv;
    const style = meeting ? ` style="--fill:${fill.toFixed(1)}%"` : '';
    html += `<a href="${stop.file}" class="${cls}"${style}>${label}</a>`;
  });
  $('progress-line').innerHTML = html;
}

function escHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

let dragSrcId = null;
function renderIdeas() {
  const teamId = getCurrentTeamId();
  const ideas = WS.ideas.filter(i => i.teamId === teamId);
  const list = $('idea-list');
  const empty = $('empty-state');
  if (ideas.length === 0) { list.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  list.innerHTML = ideas.map(idea => {
    const user = userById(idea.createdBy);
    const name = user ? fullName(user) : '?';
    return `<div class="idea-row" data-idea-id="${idea.id}">
      <span class="idea-row__handle" aria-hidden="true">&#8942;&#8942;</span>
      <div class="idea-row__content">
        <div class="idea-row__title">${escHtml(idea.title)}</div>
        <div class="idea-row__desc">${escHtml(idea.description)}</div>
        <div class="idea-row__meta">${name} &middot; ${idea.createdDate}</div>
      </div>
      <div class="idea-row__actions">
        <button class="btn btn--outline btn--sm" data-edit-idea="${idea.id}">${t('idea.edit')}</button>
        <button class="btn btn--outline btn--sm" data-delete-idea="${idea.id}" style="color:var(--err);border-color:var(--err);">&#10007;</button>
      </div>
    </div>`;
  }).join('');

  // Drag & drop — only initiate from handle
  let activeRow = null;
  list.querySelectorAll('.idea-row__handle').forEach(handle => {
    handle.addEventListener('mousedown', () => {
      const row = handle.closest('.idea-row');
      if (row) { row.setAttribute('draggable', 'true'); activeRow = row; }
    });
  });
  document.addEventListener('mouseup', () => {
    if (activeRow) { activeRow.removeAttribute('draggable'); activeRow = null; }
  });

  list.querySelectorAll('.idea-row').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragSrcId = row.dataset.ideaId;
      e.dataTransfer.effectAllowed = 'move';
      row.style.opacity = '0.4';
    });
    row.addEventListener('dragend', () => {
      row.style.opacity = '1';
      row.removeAttribute('draggable');
      activeRow = null;
      list.querySelectorAll('.idea-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => { row.classList.remove('drag-over'); });
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      const targetId = row.dataset.ideaId;
      if (dragSrcId === targetId) return;
      const teamId = getCurrentTeamId();
      const teamIdeas = WS.ideas.filter(i => i.teamId === teamId);
      const srcIdx = teamIdeas.findIndex(i => i.id === dragSrcId);
      const tgtIdx = teamIdeas.findIndex(i => i.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;
      const globalSrcIdx = WS.ideas.indexOf(teamIdeas[srcIdx]);
      const [moved] = WS.ideas.splice(globalSrcIdx, 1);
      const globalTgtIdx = WS.ideas.indexOf(teamIdeas[tgtIdx > srcIdx ? tgtIdx - 1 : tgtIdx]);
      WS.ideas.splice(tgtIdx > srcIdx ? globalTgtIdx + 1 : globalTgtIdx, 0, moved);
      renderIdeas();
    });
  });
}

// Slide-over
function openIdeaSlideOver(ideaId) {
  S.editIdeaId = ideaId || null;
  const isEdit = !!ideaId;
  const idea = isEdit ? WS.ideas.find(i => i.id === ideaId) : null;
  $('so-idea-title').textContent = isEdit ? t('idea.edit') : t('idea.new');
  $('idea-title-input').value = isEdit ? idea.title : '';
  $('idea-desc-input').value = isEdit ? idea.description : '';
  $('overlay').classList.add('overlay--visible');
  $('so-idea').classList.add('slide-over--open');
  setTimeout(() => $('idea-title-input').focus(), 300);
}
function closeIdeaSlideOver() { $('overlay').classList.remove('overlay--visible'); $('so-idea').classList.remove('slide-over--open'); S.editIdeaId = null; }
$('so-idea-close').addEventListener('click', closeIdeaSlideOver);
$('so-idea-cancel').addEventListener('click', closeIdeaSlideOver);
$('overlay').addEventListener('click', closeIdeaSlideOver);
$('btn-new-idea').addEventListener('click', () => openIdeaSlideOver(null));

$('so-idea-save').addEventListener('click', () => {
  const title = $('idea-title-input').value.trim();
  const desc = $('idea-desc-input').value.trim();
  if (!title) { showToast('Ange en titel'); return; }
  if (S.editIdeaId) {
    const idea = WS.ideas.find(i => i.id === S.editIdeaId);
    if (idea) { idea.title = title; idea.description = desc; }
    showToast(t('btn.save'));
  } else {
    WS.ideas.push({ id: 'i' + Date.now(), teamId: getCurrentTeamId(), title, description: desc, createdBy: actor().userId, createdDate: new Date().toISOString().slice(0, 10) });
    showToast(t('btn.save'));
  }
  closeIdeaSlideOver();
  renderIdeas();
});

document.addEventListener('click', e => {
  const editBtn = e.target.closest('[data-edit-idea]');
  if (editBtn) { openIdeaSlideOver(editBtn.dataset.editIdea); return; }
  const deleteBtn = e.target.closest('[data-delete-idea]');
  if (deleteBtn) { const id = deleteBtn.dataset.deleteIdea; const idea = WS.ideas.find(i => i.id === id); if (!idea) return; showConfirm(t('idea.confirmDelete'), `"${idea.title}"`, t('btn.confirm'), () => { WS.ideas = WS.ideas.filter(i => i.id !== id); renderIdeas(); showToast(t('idea.delete') + ': ' + idea.title); }); return; }
});

function setRole(role) { S.role = role; localStorage.setItem('itt-role', role); document.body.className = 'role-' + role; document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('role-btn--active', b.dataset.role === role)); const orgs = orgsForActor(); if (orgs.length > 0 && !orgs.find(o => o.id === S.orgId)) { S.orgId = orgs[0].id; localStorage.setItem('itt-org', S.orgId); } renderAll(); }

function toggleIntegChat() {
  const chat = document.getElementById('integ-chat');
  if (chat) chat.classList.toggle('integ-chat--open');
}

function renderAll() { renderOrgSelector(); renderTeamSelector(); renderSidebar(); renderProgressLine(); updateStaticText(); renderIdeas(); }
document.querySelectorAll('.role-btn').forEach(b => { b.addEventListener('click', () => setRole(b.dataset.role)); });
(function init() { const lang = localStorage.getItem('itt-lang') || 'sv'; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); document.documentElement.lang = lang; setRole(S.role); })();
</script>
