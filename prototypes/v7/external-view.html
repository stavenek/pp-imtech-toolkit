<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extern vy v7 — Integral Teamwork Toolkit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#fff; --bg-dark:#0a0a0a; --text:#111; --muted:#666; --border:#d9d9d9; --hi:#ffcc00; --hi-soft:rgba(255,204,0,.18); --sidebar-w:240px;
  --xs:4px; --sm:8px; --md:12px; --lg:18px; --xl:24px;
}
body { font-family:'Inter',system-ui,sans-serif; font-size:14px; line-height:1.45; color:var(--text); background:var(--bg); display:flex; min-height:100vh; }
.sidebar { position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); background:var(--bg-dark); border-right:3px solid var(--hi); display:flex; flex-direction:column; overflow-y:auto; }
.sidebar__header { padding:var(--md) var(--lg); border-bottom:1px solid #333; }
.sidebar__logo { color:var(--hi); text-decoration:none; font-size:15px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
.sidebar__nav { flex:1; padding:var(--sm) 0; }
.sidebar__link { display:block; padding:var(--sm) var(--lg); color:#ccc; text-decoration:none; font-size:12px; font-weight:600; border-left:3px solid transparent; }
.sidebar__link:hover { color:#fff; background:rgba(255,255,255,.05); }
.sidebar__link--active { color:var(--hi); background:var(--hi-soft); border-left-color:var(--hi); }
.sidebar__section-label { padding:var(--lg) var(--lg) var(--xs); color:var(--hi); font-size:14px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
.sidebar__divider { height:1px; background:#333; margin:var(--sm) var(--lg); }
.sidebar__footer { padding:var(--sm) 0; border-top:1px solid #333; }
.lang-switcher { display:flex; gap:2px; padding:var(--sm) var(--lg); }
.lang-btn { padding:var(--xs) var(--sm); border:1px solid #555; background:transparent; color:#888; font-size:10px; font-weight:900; cursor:pointer; }
.lang-btn--active { background:var(--hi); color:#000; border-color:var(--hi); }
.page-wrap { flex:1; margin-left:var(--sidebar-w); min-width:0; }
.main { height:100vh; display:grid; grid-template-rows:auto 1fr; }
.head { padding:var(--xl); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:var(--md); align-items:flex-end; flex-wrap:wrap; }
.page-title { font-size:30px; font-weight:800; letter-spacing:-.02em; }
.page-subtitle { color:var(--muted); margin-top:4px; }
.open-link { color:#111; font-weight:700; }
.frame-wrap { position:relative; min-height:0; background:#f5f5f5; }
.frame { width:100%; height:100%; border:none; background:#fff; }
.fallback { position:absolute; inset:0; display:none; place-items:center; padding:var(--xl); background:linear-gradient(135deg,#f3f3ef,#fff); }
.fallback--show { display:grid; }
.fallback__card { max-width:560px; background:#fff; border:2px solid #111; padding:var(--xl); }
.fallback__card p { margin-bottom:var(--md); }
.btn { display:inline-flex; align-items:center; min-height:40px; padding:0 var(--md); border:2px solid #111; background:var(--hi); color:#000; font:700 12px inherit; text-decoration:none; }
</style>
</head>
<body>
<aside class="sidebar" aria-label="Huvudnavigering">
  <div class="sidebar__header"><a href="dashboard.html" class="sidebar__logo">ITT</a></div>
  <nav class="sidebar__nav" id="sidebar-nav"></nav>
  <div class="sidebar__footer">
    <a href="admin.html" class="sidebar__link" id="nav-admin">&#9881; Admin</a>
    <div class="lang-switcher"><button class="lang-btn" data-lang="sv">SV</button><button class="lang-btn" data-lang="en">EN</button></div>
  </div>
</aside>
<div class="page-wrap">
  <main class="main">
    <div class="head">
      <div>
        <h1 class="page-title" id="page-title">Extern vy</h1>
        <div class="page-subtitle" id="page-subtitle">https://integpartner.com</div>
      </div>
      <a class="open-link" id="open-link" href="https://integpartner.com" target="_blank" rel="noopener noreferrer">Oppna i ny flik</a>
    </div>
    <div class="frame-wrap">
      <iframe class="frame" id="external-frame" title="Extern vy" referrerpolicy="no-referrer"></iframe>
      <div class="fallback" id="fallback">
        <div class="fallback__card">
          <p id="fallback-text">Den externa sidan blockerar inbaddning i iframe. Oppna sidan i en ny flik i stallet.</p>
          <a class="btn" id="fallback-link" href="https://integpartner.com" target="_blank" rel="noopener noreferrer">Oppna extern sida</a>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="i18n-sv.js"></script>
<script src="i18n-en.js"></script>
<script>
const TRANSLATIONS = { sv: LANG_SV, en: LANG_EN };
let currentLang = localStorage.getItem('itt-lang') || 'sv';
const $ = id => document.getElementById(id);
const MODULES = [
  { key:'strategic', file:'strategic.html', section:1, fullKey:'mod.strategic' },
  { key:'newsflash', file:'newsflash.html', section:1, fullKey:'mod.newsflash' },
  { key:'desiredState', file:'desired-state.html', section:2, fullKey:'mod.desiredState' },
  { key:'goalsMetrics', file:'goals-metrics.html', section:2, fullKey:'mod.goalsMetrics' },
  { key:'bestContributions', file:'best-contributions.html', section:3, fullKey:'mod.bestContributions' },
  { key:'actionPlan', file:'action-plan.html', section:3, fullKey:'mod.actionPlan' },
  { key:'documents', file:'documents.html', section:3, fullKey:'mod.documents' },
  { key:'ideas', file:'ideas.html', section:3, fullKey:'mod.ideas' },
  { key:'reflections', file:'reflections.html', section:4, fullKey:'mod.reflections' },
  { key:'attendance', file:'attendance.html', section:4, fullKey:'mod.attendance' },
  { key:'completedBestContributions', file:'completed-best-contributions.html', section:4, fullKey:'mod.completedBestContributions' },
];
const SECTION_LABELS = { 1:{sv:'1. Vart är vi på väg?', en:'1. Where are we headed?'}, 2:{sv:'2. Vad siktar vi på?', en:'2. What are we aiming for?'}, 3:{sv:'3. Gör vi framsteg?', en:'3. Are we making progress?'}, 4:{sv:'4. Lär vi oss?', en:'4. Are we learning?'} };
function t(key) { return (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS.sv[key] || key; }
function renderSidebar() {
  let html = `<a href="dashboard.html" class="sidebar__link">${t('nav.dashboard')}</a><div class="sidebar__divider"></div>`;
  let last = 0;
  MODULES.forEach(m => {
    if (m.section !== last) {
      html += `<div class="sidebar__section-label">${currentLang === 'en' ? SECTION_LABELS[m.section].en : SECTION_LABELS[m.section].sv}</div>`;
      last = m.section;
    }
    html += `<a href="${m.file}" class="sidebar__link">${t(m.fullKey)}</a>`;
  });
  html += `<div class="sidebar__divider"></div><a href="external-view.html?src=https%3A%2F%2Fintegpartner.com" class="sidebar__link sidebar__link--active">${t('ap.externalView')}</a>`;
  $('sidebar-nav').innerHTML = html;
}
function renderLanguage() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('lang-btn--active', btn.dataset.lang === currentLang));
  $('nav-admin').innerHTML = '&#9881; ' + t('nav.admin');
}
function loadExternal() {
  const src = new URLSearchParams(window.location.search).get('src') || 'https://integpartner.com';
  $('page-title').textContent = currentLang === 'en' ? 'External View' : 'Extern vy';
  $('page-subtitle').textContent = src;
  $('open-link').href = src;
  $('fallback-link').href = src;
  $('open-link').textContent = currentLang === 'en' ? 'Open in new tab' : 'Oppna i ny flik';
  $('fallback-text').textContent = currentLang === 'en'
    ? 'The external site blocks iframe embedding. Open it in a new tab instead.'
    : 'Den externa sidan blockerar inbaddning i iframe. Oppna sidan i en ny flik i stallet.';
  $('fallback-link').textContent = currentLang === 'en' ? 'Open external site' : 'Oppna extern sida';
  $('fallback').classList.remove('fallback--show');
  const frame = $('external-frame');
  frame.src = src;
  setTimeout(() => $('fallback').classList.add('fallback--show'), 2500);
}
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
  currentLang = btn.dataset.lang;
  localStorage.setItem('itt-lang', currentLang);
  renderSidebar();
  renderLanguage();
  loadExternal();
}));
renderSidebar();
renderLanguage();
loadExternal();
</script>
</body>
</html>
