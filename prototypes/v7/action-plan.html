<script>
const TRANSLATIONS = { sv: LANG_SV, en: LANG_EN };
let currentLang = localStorage.getItem('itt-lang') || 'sv';
const WS_STORAGE_KEY = 'itt-workspace-v7';
const cloneWs = data => JSON.parse(JSON.stringify(data));
try {
  const storedWs = localStorage.getItem(WS_STORAGE_KEY);
  if (storedWs) Object.assign(WS, cloneWs(JSON.parse(storedWs)));
} catch (err) {}
function persistWs() { localStorage.setItem(WS_STORAGE_KEY, JSON.stringify(WS)); }
const MODE = 'expanded';
const ACTIVE_MODULE = 'actionPlan';
const $ = id => document.getElementById(id);
const S = { role: localStorage.getItem('itt-role') || 'super-admin', orgId: localStorage.getItem('itt-org') || '', teamId: localStorage.getItem('itt-team') || 'alpha', person:'all', status:'all', search:'', openBc:{}, editMode:false };
function t(key, params) { let str = (TRANSLATIONS[currentLang] && TRANSLATIONS[currentLang][key]) || TRANSLATIONS.sv[key] || key; if (params) Object.keys(params).forEach(k => str = str.replace(new RegExp('\\{' + k + '\\}','g'), params[k])); return str; }
const canEdit = () => S.role !== 'user';
const isEditMode = () => canEdit() && S.editMode;
const actor = () => ACTORS[S.role];
const userById = id => DB.users.find(u => u.id === id);
const fullName = u => u ? `${u.firstName} ${u.lastName}` : '—';
const statusOptions = ['not_started','in_progress','overdue','done'];
const statusClass = s => `status-${s}`;
const statusLabel = s => t({ not_started:'ap.notStarted', in_progress:'ap.inProgress', overdue:'ap.overdue', done:'ap.done' }[s] || s);
const nextStatus = s => statusOptions[(Math.max(0, statusOptions.indexOf(s)) + 1) % statusOptions.length];
const bcCompletion = bcId => { const items = WS.actions.filter(a => a.teamId === S.teamId && a.bcId === bcId); if (!items.length) return 0; return Math.round((items.filter(a => a.status === 'done').length / items.length) * 100); };
const visibleBCs = () => WS.bestContributions.filter(bc => bc.teamId === S.teamId && !bc.archived);
const MODULES = [
  { key:'strategic', file:'strategic.html', section:1, fullKey:'mod.strategic' },
  { key:'newsflash', file:'newsflash.html', section:1, fullKey:'mod.newsflash' },
  { key:'desiredState', file:'desired-state.html', section:2, fullKey:'mod.desiredState' },
  { key:'goalsMetrics', file:'goals-metrics.html', section:2, fullKey:'mod.goalsMetrics' },
  { key:'bestContributions', file:'best-contributions.html', section:3, fullKey:'mod.bestContributions' },
  { key:'actionPlan', file:'action-plan.html', section:3, fullKey:'mod.actionPlan' },
  { key:'documents', file:'documents.html', section:3, fullKey:'mod.documents' },
  { key:'ideas', file:'ideas.html', section:3, fullKey:'mod.ideas' },
  { key:'reflections', file:'reflections.html', section:4, fullKey:'mod.reflections' },
  { key:'attendance', file:'attendance.html', section:4, fullKey:'mod.attendance' },
  { key:'completedBestContributions', file:'completed-best-contributions.html', section:4, fullKey:'mod.completedBestContributions' },
];
const SECTION_LABELS = { 1:{sv:'1. Vart är vi på väg?', en:'1. Where are we headed?'}, 2:{sv:'2. Vad siktar vi på?', en:'2. What are we aiming for?'}, 3:{sv:'3. Gör vi framsteg?', en:'3. Are we making progress?'}, 4:{sv:'4. Lär vi oss?', en:'4. Are we learning?'} };
function setLang(lang) { currentLang = lang; localStorage.setItem('itt-lang', lang); document.documentElement.lang = lang; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === lang)); renderAll(); }
document.addEventListener('click', e => { if (e.target.matches('[data-lang]')) setLang(e.target.dataset.lang); });
function orgsForActor() { const a = actor(); if (S.role === 'super-admin') return DB.organizations; return DB.organizations.filter(o => a.orgs.includes(o.id)); }
function teamsForActor() { const a = actor(); const u = userById(a.userId); if (['super-admin','integ-admin','org-admin'].includes(S.role)) { let teams = DB.teams.filter(t => a.orgs.includes(t.orgId)); if (S.orgId) teams = teams.filter(t => t.orgId === S.orgId); return teams; } return DB.teams.filter(t => u.memberships.some(m => m.teamId === t.id)); }
function membersForTeam() { return DB.users.filter(u => u.memberships.some(m => m.teamId === S.teamId) && u.registerStatus !== 'soft_deleted'); }
function renderSelectors() {
  const orgs = orgsForActor(); const orgWrap = $('org-selector-wrap'); const orgSel = $('org-select');
  if (!['super-admin','integ-admin','org-admin'].includes(S.role) || orgs.length <= 1) { orgWrap.style.display = 'none'; if (orgs[0]) S.orgId = orgs[0].id; } else { orgWrap.style.display = ''; if (!orgs.find(o => o.id === S.orgId)) S.orgId = orgs[0].id; orgSel.innerHTML = orgs.map(o => `<option value="${o.id}" ${o.id===S.orgId?'selected':''}>${o.title}</option>`).join(''); }

  if (teams.length <= 1) { teamWrap.style.display = 'none'; } else { teamWrap.style.display = ''; teamSel.innerHTML = teams.map(t => `<option value="${t.id}" ${t.id===S.teamId?'selected':''}>${t.title}</option>`).join(''); }
}
$('org-select').addEventListener('change', e => { S.orgId = e.target.value; localStorage.setItem('itt-org', S.orgId); S.teamId = teamsForActor()[0]?.id || 'alpha'; localStorage.setItem('itt-team', S.teamId); renderAll(); });
$('team-select').addEventListener('change', e => { S.teamId = e.target.value; localStorage.setItem('itt-team', S.teamId); renderAll(); });
function renderSidebar() {
  let html = `<a href="dashboard.html" class="sidebar__link">${t('nav.dashboard')}</a><div class="sidebar__divider"></div>`; let last = 0;
  MODULES.forEach(m => { if (m.section !== last) { html += `<div class="sidebar__section-label">${currentLang === 'en' ? SECTION_LABELS[m.section].en : SECTION_LABELS[m.section].sv}</div>`; last = m.section; } html += `<a href="${m.file}" class="sidebar__link${m.key===ACTIVE_MODULE?' sidebar__link--active':''}">${t(m.fullKey)}</a>`; });
  html += `<div class="sidebar__divider"></div><a href="external-view.html?src=https%3A%2F%2Fintegpartner.com" class="sidebar__link">${t('ap.externalView')}</a>`;
  $('sidebar-nav').innerHTML = html;
}
function renderFilters() {
  const members = membersForTeam();
  $('filter-person').innerHTML = `<option value="all">${t('ap.filterPerson')}</option>` + members.map(u => `<option value="${u.id}" ${S.person===u.id?'selected':''}>${fullName(u)}</option>`).join('');
  $('filter-status').innerHTML = `<option value="all">${t('ap.filterStatus')}</option>` + statusOptions.map(s => `<option value="${s}" ${S.status===s?'selected':''}>${t({not_started:'ap.notStarted',in_progress:'ap.inProgress',overdue:'ap.overdue',done:'ap.done'}[s])}</option>`).join('');
}
function filteredActions(bcId, aoiId) {
  return WS.actions
    .filter(a => a.teamId === S.teamId && a.bcId === bcId && a.aiId === aoiId)
    .filter(a => S.person === 'all' || a.responsibleId === S.person || a.supportId === S.person)
    .filter(a => S.status === 'all' ? a.status !== 'done' : a.status === S.status)
    .filter(a => !S.search || a.title.toLowerCase().includes(S.search) || (a.comment || '').toLowerCase().includes(S.search));
}
function renderFocus() {
  const txt = ensureTextModule();
  const focusValue = txt.teamFocus || txt.desiredState || '';
  $('team-focus-label').textContent = t('ap.teamFocus');
  $('team-focus-value').innerHTML = isEditMode()
    ? `<textarea class="hero-strip__editor" data-team-focus placeholder="${t('ds.desiredPlaceholder')}">${esc(focusValue)}</textarea>`
    : `<div class="hero-strip__text">${displayValue(focusValue)}</div>`;
}
function ensureBcNotes(bc) {
  if (bc.startingPointText === undefined) bc.startingPointText = '';
  if (bc.desiredStateText === undefined) bc.desiredStateText = '';
  return bc;
}
function ensureTextModule() {
  if (!WS.textModules[S.teamId]) WS.textModules[S.teamId] = { currentState:'', desiredState:'', teamFocus:'', reflections:[] };
  if (WS.textModules[S.teamId].teamFocus === undefined) WS.textModules[S.teamId].teamFocus = '';
  return WS.textModules[S.teamId];
}
function displayValue(value) {
  return String(value || '').trim() ? esc(value).replace(/\n/g, '<br>') : '—';
}
function renderStateLines(bc) {
  const notes = ensureBcNotes(bc);
  if (!isEditMode()) {
    return `<div class="state-lines"><div><strong>${t('ds.currentTitle')}:</strong> ${displayValue(notes.startingPointText)}</div><div><strong>${t('ds.desiredTitle')}:</strong> ${displayValue(notes.desiredStateText)}</div></div>`;
  }
  return `<div class="state-lines state-lines--editable">
    <label class="state-line-editor">
      <span class="state-line-editor__label">${t('ds.currentTitle')}</span>
      <textarea class="state-line-editor__field" data-bc-text="startingPointText" data-bc-id="${bc.id}" placeholder="${t('ds.currentPlaceholder')}">${esc(notes.startingPointText)}</textarea>
    </label>
    <label class="state-line-editor">
      <span class="state-line-editor__label">${t('ds.desiredTitle')}</span>
      <textarea class="state-line-editor__field" data-bc-text="desiredStateText" data-bc-id="${bc.id}" placeholder="${t('ds.desiredPlaceholder')}">${esc(notes.desiredStateText)}</textarea>
    </label>
  </div>`;
}
function renderCellDisplay(value, extraClass = '') {
  return `<div class="cell-display${extraClass ? ` ${extraClass}` : ''}">${displayValue(value)}</div>`;
}
function renderStateEditor() {
  const txt = ensureTextModule();
  $('state-editor').innerHTML = `
    <div class="text-module">
      <div class="text-module__title">${t('ds.currentTitle')}</div>
      <div class="text-module__help">${t('ds.currentHelp')}</div>
      ${isEditMode()
        ? `<textarea id="state-current-input" data-text-field="currentState" placeholder="${t('ds.currentPlaceholder')}">${esc(txt.currentState || '')}</textarea>`
        : `<div class="state-line-editor__text">${displayValue(txt.currentState)}</div>`
      }
    </div>
    <div class="text-module">
      <div class="text-module__title">${t('ds.desiredTitle')}</div>
      <div class="text-module__help">${t('ds.desiredHelp')}</div>
      ${isEditMode()
        ? `<textarea id="state-desired-input" data-text-field="desiredState" placeholder="${t('ds.desiredPlaceholder')}">${esc(txt.desiredState || '')}</textarea>`
        : `<div class="state-line-editor__text">${displayValue(txt.desiredState)}</div>`
      }
    </div>
  `;
}
function personOptions(selected) { return `<option value=""></option>` + membersForTeam().map(u => `<option value="${u.id}" ${u.id===selected?'selected':''}>${fullName(u)}</option>`).join(''); }
function statusOptionsHtml(selected) { return statusOptions.map(s => `<option value="${s}" ${s===selected?'selected':''}>${t({not_started:'ap.notStarted',in_progress:'ap.inProgress',overdue:'ap.overdue',done:'ap.done'}[s])}</option>`).join(''); }
function renderBCList() {
  const list = $('bc-list'); const teamBcs = visibleBCs();
  if (!teamBcs.length) { list.innerHTML = `<div class="done-list">${t('bc.empty')}</div>`; return; }
  list.innerHTML = teamBcs.map(bc => {
    const open = S.openBc[bc.id] !== undefined ? S.openBc[bc.id] : MODE === 'expanded';
    const pct = bcCompletion(bc.id);
    return `<section class="bc-card ${open ? 'bc-card--open' : ''}" data-bc="${bc.id}">
      <div class="bc-header">
        <button class="bc-toggle" data-toggle="${bc.id}">${open ? '−' : '+'}</button>
        ${isEditMode()
          ? `<input class="bc-title-input" data-bc-title="${bc.id}" value="${esc(bc.title)}" placeholder="${t('bc.titlePlaceholder')}">`
          : `<div class="bc-title-text">${displayValue(bc.title)}</div>`
        }
        ${isEditMode() ? `<button class="btn btn--outline btn--sm" data-add-aoi="${bc.id}" data-min-role="team-leader">${t('ap.newAoi')}</button>` : ''}
      </div>
      <div class="progress-band"><div class="progress-band__label">${t('ap.progressDegree')}</div><div class="progress-band__track"><div class="progress-band__fill" style="width:${pct}%"></div></div><div class="progress-band__pct">${pct}%</div></div>
      ${renderStateLines(bc)}
      <div class="bc-body">
        ${bc.areaOfImprovement.map(aoi => renderAOI(bc, aoi)).join('')}
        ${isEditMode() ? `<div style="padding:0 0 0 0;margin-top:8px;" data-min-role="team-leader"><button class="btn btn--outline btn--sm" data-archive-bc="${bc.id}">${currentLang === 'en' ? 'Move to completed' : 'Flytta till avslutade'}</button></div>` : ''}
      </div>
    </section>`;
  }).join('');
}
function renderAOI(bc, aoi) {
  const actions = filteredActions(bc.id, aoi.id);
  return `<div class="aoi-block">
    <div class="aoi-head">
      <div class="aoi-head__col aoi-head__col--spacer"></div>
      ${isEditMode()
        ? `<input class="aoi-title-input" data-aoi-title="${aoi.id}" value="${esc(aoi.title)}" placeholder="${t('ap.aoiPlaceholder')}">`
        : `<div class="aoi-title-text">${displayValue(aoi.title)}</div>`
      }
      <div class="aoi-head__col">${t('ap.responsible')}</div>
      <div class="aoi-head__col">${t('ap.support')}</div>
      <div class="aoi-head__col">${t('ap.deadline')}</div>
      <div class="aoi-head__col">${t('ap.commentShort')}</div>
      <div class="aoi-head__col">${currentLang === 'en' ? 'Mail' : 'Meddela'}</div>
      <div class="aoi-head__col">${currentLang === 'en' ? 'Delete' : 'Radera'}</div>
    </div>
    <table class="plan-table">
      <colgroup>
        <col class="plan-col-status">
        <col class="plan-col-action">
        <col class="plan-col-person">
        <col class="plan-col-person">
        <col class="plan-col-date">
        <col class="plan-col-comment">
        <col class="plan-col-icon">
        <col class="plan-col-icon">
      </colgroup>
      <tbody>${actions.map(a => renderActionRow(a, aoi)).join('')}</tbody>
    </table>
    ${isEditMode() ? `<div style="padding:8px 0 0;"><button class="btn btn--outline btn--sm" data-add-action="${bc.id}|${aoi.id}" data-min-role="team-leader">${t('ap.addAction')}</button></div>` : ''}
  </div>`;
}
function renderActionRow(a, aoi) {
  const comment = a.comment || '';
  const responsible = fullName(userById(a.responsibleId));
  const support = fullName(userById(a.supportId));
  return `<tr data-action="${a.id}">
    <td class="status-col"><button class="status-dot-btn" data-status-dot="${a.id}" title="${statusLabel(a.status)}" ${isEditMode() ? '' : 'disabled'}><span class="status-dot status-dot--${a.status}"></span></button></td>
    <td>${isEditMode() ? `<textarea class="cell-input cell-action" data-field="title" data-id="${a.id}" placeholder="${t('ap.actionPlaceholder')}">${esc(a.title)}</textarea>` : renderCellDisplay(a.title, !a.title && 'cell-display--muted')}</td>
    <td>${isEditMode() ? `<select class="cell-select" data-field="responsibleId" data-id="${a.id}">${personOptions(a.responsibleId)}</select>` : renderCellDisplay(responsible, !a.responsibleId && 'cell-display--muted')}</td>
    <td>${isEditMode() ? `<select class="cell-select" data-field="supportId" data-id="${a.id}">${personOptions(a.supportId)}</select>` : renderCellDisplay(support, !a.supportId && 'cell-display--muted')}</td>
    <td>${isEditMode() ? `<input class="cell-date" type="date" data-field="deadline" data-id="${a.id}" value="${a.deadline || ''}">` : renderCellDisplay(a.deadline, !a.deadline && 'cell-display--muted')}</td>
    <td>${isEditMode() ? `<input class="cell-input cell-comment" data-field="comment" data-id="${a.id}" value="${esc(comment)}" title="${esc(comment)}" placeholder="${t('ap.commentPlaceholder')}">` : `<div class="cell-display cell-comment${comment ? '' : ' cell-display--muted'}" data-comment-preview="${a.id}" title="${esc(comment)}">${displayValue(comment)}</div>`}</td>
    <td><div class="icon-cell">&#9993;</div></td>
    <td>${isEditMode() ? `<button class="icon-cell" style="border:none;background:transparent;cursor:pointer;" data-delete-action="${a.id}">&#128465;</button>` : `<div class="icon-cell">—</div>`}</td>
  </tr>`;
}
function renderDone() {
  const done = WS.actions.filter(a => a.teamId === S.teamId && a.status === 'done');
  $('done-title').textContent = `${t('ap.completedSteps')} (${done.length})`;
  $('done-list').innerHTML = done.length ? done.map(a => `${a.title} · ${a.deadline || '—'}`).join('<br>') : (currentLang === 'en' ? 'No completed steps yet.' : 'Inga avklarade steg ännu.');
}
function esc(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function attachEvents() {
  document.querySelectorAll('[data-toggle]').forEach(btn => btn.onclick = () => { S.openBc[btn.dataset.toggle] = !(S.openBc[btn.dataset.toggle] !== undefined ? S.openBc[btn.dataset.toggle] : MODE === 'expanded'); renderBCList(); attachEvents(); });
  document.querySelectorAll('[data-team-focus]').forEach(el => el.onchange = () => { const txt = ensureTextModule(); txt.teamFocus = el.value; persistWs(); renderFocus(); });
  document.querySelectorAll('[data-text-field]').forEach(el => el.onchange = () => { const txt = ensureTextModule(); txt[el.dataset.textField] = el.value; persistWs(); renderStateEditor(); });
  document.querySelectorAll('[data-bc-title]').forEach(el => el.onchange = () => { const bc = WS.bestContributions.find(b => b.id === el.dataset.bcTitle); if (bc) bc.title = el.value; persistWs(); renderAll(); });
  document.querySelectorAll('[data-bc-text]').forEach(el => el.onchange = () => { const bc = WS.bestContributions.find(b => b.id === el.dataset.bcId); if (!bc) return; bc[el.dataset.bcText] = el.value; persistWs(); renderAll(); });
  document.querySelectorAll('[data-aoi-title]').forEach(el => el.onchange = () => { WS.bestContributions.forEach(bc => bc.areaOfImprovement.forEach(aoi => { if (aoi.id === el.dataset.aoiTitle) aoi.title = el.value; })); persistWs(); renderAll(); });
  document.querySelectorAll('[data-field]').forEach(el => el.onchange = () => { const a = WS.actions.find(x => x.id === el.dataset.id); if (!a) return; a[el.dataset.field] = el.value; persistWs(); renderDone(); });
  document.querySelectorAll('[data-comment-preview]').forEach(el => el.onclick = () => { const a = WS.actions.find(x => x.id === el.dataset.commentPreview); $('comment-title').textContent = t('ap.commentShort'); $('comment-text').textContent = a?.comment || ''; $('comment-pop').classList.add('comment-pop--open'); });
  document.querySelectorAll('[data-add-action]').forEach(btn => btn.onclick = () => { const [bcId, aoiId] = btn.dataset.addAction.split('|'); WS.actions.unshift({ id:'a_'+Math.random().toString(36).slice(2,7), teamId:S.teamId, bcId, aiId:aoiId, title:'', description:'', responsibleId:'', supportId:'', deadline:'', status:'not_started', comment:'' }); persistWs(); renderAll(); });
  document.querySelectorAll('[data-add-aoi]').forEach(btn => btn.onclick = () => { const bc = WS.bestContributions.find(b => b.id === btn.dataset.addAoi); if (!bc) return; bc.areaOfImprovement.push({ id:'ai_'+Math.random().toString(36).slice(2,7), title: currentLang === 'en' ? 'New area' : 'Nytt område' }); S.openBc[bc.id] = true; persistWs(); renderAll(); });
  document.querySelectorAll('[data-delete-action]').forEach(btn => btn.onclick = () => { WS.actions = WS.actions.filter(a => a.id !== btn.dataset.deleteAction); persistWs(); renderAll(); });
  document.querySelectorAll('[data-archive-bc]').forEach(btn => btn.onclick = () => { const bc = WS.bestContributions.find(b => b.id === btn.dataset.archiveBc); if (!bc) return; bc.archived = true; bc.archivedAt = new Date().toISOString().slice(0,10); persistWs(); renderAll(); });
  document.querySelectorAll('[data-status-dot]').forEach(btn => btn.onclick = () => { if (!isEditMode()) return; const a = WS.actions.find(x => x.id === btn.dataset.statusDot); if (!a) return; a.status = nextStatus(a.status); persistWs(); renderAll(); });
}
function renderAll() {
  if (!canEdit()) S.editMode = false;
  document.body.className = 'role-' + S.role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('role-btn--active', b.dataset.role === S.role));
  renderSelectors(); renderSidebar(); renderFilters(); renderStateEditor(); renderFocus(); renderBCList(); renderDone(); attachEvents();
  $('page-title').textContent = t('ap.title');
  $('btn-new-bc').textContent = t('ap.newBc');
  $('btn-open-edit').textContent = isEditMode()
    ? (currentLang === 'en' ? 'Done editing' : 'Klar med redigering')
    : (currentLang === 'en' ? 'Edit action plan' : 'Redigera handlingsplan');
  $('btn-new-action-global').textContent = currentLang === 'en' ? '+ New action' : '+ Ny åtgärd';
  $('toggle-all').textContent = allOpen() ? t('ap.closeAll') : t('ap.openAll');
  $('team-focus-label').textContent = t('ap.teamFocus');
  $('search').placeholder = t('ap.searchPlaceholder');
  $('nav-admin').innerHTML = '&#9881; ' + t('nav.admin');
  $('skip-link').textContent = t('skip');
  $('btn-new-action-global').hidden = !isEditMode();
  $('btn-new-bc').hidden = !isEditMode();
}
function allOpen() { return visibleBCs().every(b => S.openBc[b.id] !== false); }
$('toggle-all').onclick = () => { const open = !allOpen(); visibleBCs().forEach(b => S.openBc[b.id] = open); renderAll(); };
$('btn-new-bc').onclick = () => { if (!isEditMode()) return; const id = 'bc_' + Math.random().toString(36).slice(2,7); WS.bestContributions.unshift({ id, teamId:S.teamId, title: currentLang === 'en' ? 'New best contribution' : 'Nytt bästa bidrag', startingPointText:'', desiredStateText:'', areaOfImprovement:[{ id:'ai_'+Math.random().toString(36).slice(2,7), title: currentLang === 'en' ? 'New area' : 'Nytt område' }] }); S.openBc[id] = true; persistWs(); renderAll(); };
$('btn-open-edit').onclick = () => {
  if (!canEdit()) return;
  S.editMode = !S.editMode;
  renderAll();
  if (!S.editMode) return;
  const first = document.querySelector('[data-team-focus], [data-text-field], .bc-title-input, [data-bc-text], [data-aoi-title], .cell-action, .cell-input, .cell-select');
  if (first) {
    first.focus();
    first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
};
$('btn-new-action-global').onclick = () => {
  if (!isEditMode()) return;
  const bc = visibleBCs()[0];
  if (!bc) return;
  const aoi = bc.areaOfImprovement[0];
  if (!aoi) return;
  WS.actions.unshift({ id:'a_'+Math.random().toString(36).slice(2,7), teamId:S.teamId, bcId:bc.id, aiId:aoi.id, title:'', description:'', responsibleId:'', supportId:'', deadline:'', status:'not_started', comment:'' });
  S.openBc[bc.id] = true;
  persistWs();
  renderAll();
};
$('filter-person').onchange = e => { S.person = e.target.value; renderAll(); };
$('filter-status').onchange = e => { S.status = e.target.value; renderAll(); };
$('search').oninput = e => { S.search = e.target.value.toLowerCase(); renderAll(); };
$('comment-close').onclick = () => $('comment-pop').classList.remove('comment-pop--open');
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
document.querySelectorAll('.role-btn').forEach(btn => btn.onclick = () => { S.role = btn.dataset.role; localStorage.setItem('itt-role', S.role); renderAll(); });
document.documentElement.lang = currentLang; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === currentLang)); renderAll();
</script>
</body>
</html>
