  const editor = multiline
    ? `<textarea class="editable-text__editor" placeholder="${esc(placeholder)}">${esc(value)}</textarea>`
    : `<input class="editable-text__editor" type="text" value="${esc(value)}" placeholder="${esc(placeholder)}">`;
  return `<div class="editable-text editable-text--${multiline ? 'multiline' : 'inline'} editable-text--${variant}" data-bc-id="${bcId}" data-bc-field="${field}">
    <div class="editable-text__view">
      <div class="editable-text__content">${view}</div>
      ${canEdit() ? `<button class="editable-text__icon" type="button" data-edit-open aria-label="${currentLang === 'en' ? 'Edit text' : 'Redigera text'}">&#9998;</button>` : ''}
    </div>
    ${canEdit() ? editor : ''}
  </div>`;
}
function saveBcText(wrapper) {
  const bc = WS.bestContributions.find(item => item.id === wrapper.dataset.bcId);
  const editor = wrapper.querySelector('.editable-text__editor');
  if (!bc || !editor) return;
  bc[wrapper.dataset.bcField] = editor.value;
  persistWs();
  renderAll();
}
function openEditableText(wrapper) {
  if (!canEdit() || !wrapper) return;
  wrapper.classList.add('editable-text--editing');
  const editor = wrapper.querySelector('.editable-text__editor');
  if (!editor) return;
  wrapper.dataset.originalValue = editor.value;
  editor.focus();
  if (editor.select) editor.select();
}
function renderBCList() {
  const list = $('bc-list'); const teamBcs = visibleBCs();
  if (!teamBcs.length) { list.innerHTML = `<div class="done-list">${t('bc.empty')}</div>`; return; }
  list.innerHTML = teamBcs.map(bc => {
    const open = S.openBc[bc.id] !== undefined ? S.openBc[bc.id] : MODE === 'expanded';
    const notes = ensureBcNotes(bc);
    return `<section class="bc-card ${open ? 'bc-card--open' : ''}" data-bc="${bc.id}">
      <div class="bc-header">
        <button class="bc-toggle" data-toggle="${bc.id}">${open ? '−' : '+'}</button>
        ${editableText({ bcId: bc.id, field: 'title', value: bc.title, placeholder: t('bc.titlePlaceholder'), multiline: false, variant: 'title' })}
      </div>
      <div class="bc-body">
        <div class="bc-overview-grid">
          <div class="text-module">
            <div class="text-module__title">${t('ds.currentTitle')}</div>
            <div class="text-module__help">${t('ds.currentHelp')}</div>
            ${editableText({ bcId: bc.id, field: 'startingPointText', value: notes.startingPointText, placeholder: t('ds.currentPlaceholder'), multiline: true, variant: 'note' })}
          </div>
          <div class="text-module">
            <div class="text-module__title">${t('ds.desiredTitle')}</div>
            <div class="text-module__help">${t('ds.desiredHelp')}</div>
            ${editableText({ bcId: bc.id, field: 'desiredStateText', value: notes.desiredStateText, placeholder: t('ds.desiredPlaceholder'), multiline: true, variant: 'note' })}
          </div>
        </div>
      </div>
    </section>`;
  }).join('');
}
function esc(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function attachEvents() {
  document.querySelectorAll('[data-toggle]').forEach(btn => btn.onclick = () => { S.openBc[btn.dataset.toggle] = !(S.openBc[btn.dataset.toggle] !== undefined ? S.openBc[btn.dataset.toggle] : MODE === 'expanded'); renderBCList(); attachEvents(); });
  document.querySelectorAll('[data-edit-open]').forEach(btn => btn.onclick = e => {
    e.stopPropagation();
    openEditableText(btn.closest('.editable-text'));
  });
  document.querySelectorAll('.editable-text__editor').forEach(editor => {
    editor.onkeydown = e => {
      const wrapper = editor.closest('.editable-text');
      if (e.key === 'Escape') {
        e.preventDefault();
        editor.value = wrapper.dataset.originalValue || '';
        renderAll();
        return;
      }
      if (editor.tagName === 'INPUT' && e.key === 'Enter') {
        e.preventDefault();
        saveBcText(wrapper);
        return;
      }
      if (editor.tagName === 'TEXTAREA' && e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        saveBcText(wrapper);
      }
    };
    editor.onblur = () => saveBcText(editor.closest('.editable-text'));
  });
}
function renderAll() {
  document.body.className = 'role-' + S.role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('role-btn--active', b.dataset.role === S.role));
  renderSelectors(); renderSidebar(); renderBCList(); attachEvents();
  $('page-title').textContent = t('bc.overview'); $('btn-new-bc').textContent = t('ap.newBc'); $('btn-open-action-plan').textContent = currentLang === 'en' ? 'Open action plan' : 'Öppna handlingsplan'; $('toggle-all').textContent = allOpen() ? t('ap.closeAll') : t('ap.openAll'); $('nav-admin').innerHTML = '&#9881; ' + t('nav.admin'); $('skip-link').textContent = t('skip');
}
function allOpen() { return visibleBCs().every(b => S.openBc[b.id] !== false); }
$('toggle-all').onclick = () => { const open = !allOpen(); visibleBCs().forEach(b => S.openBc[b.id] = open); renderAll(); };
$('btn-new-bc').onclick = () => { const id = 'bc_' + Math.random().toString(36).slice(2,7); WS.bestContributions.unshift({ id, teamId:S.teamId, title: currentLang === 'en' ? 'New best contribution' : 'Nytt bästa bidrag', startingPointText:'', desiredStateText:'', areaOfImprovement:[{ id:'ai_'+Math.random().toString(36).slice(2,7), title: currentLang === 'en' ? 'New area' : 'Nytt område' }] }); S.openBc[id] = true; persistWs(); renderAll(); };
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
document.querySelectorAll('.role-btn').forEach(btn => btn.onclick = () => { S.role = btn.dataset.role; localStorage.setItem('itt-role', S.role); renderAll(); });
document.documentElement.lang = currentLang; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('lang-btn--active', b.dataset.lang === currentLang)); renderAll();
</script>
</body>
</html>
